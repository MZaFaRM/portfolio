<div class="prompt-container">
	<div class="prompt-wrapper">
		<div class="prompt-taker" id="cli-text">
			<div class="prompt-text" style="font-weight: bold">
				<div class="prompt-line-top">
					╭─
					<span id="browser" class="browser xxs-hidden"></span>
					<span id="browser-verbose" class="browser xxs-show"></span>
					<span id="uptime" class="uptime xs-hidden"></span>
					<span id="uptime-verbose" class="uptime xs-show"></span>~
					<span class="fill-line"></span>
					<span class="prompt-tag">ok</span>
					<span class="error-prompt-tag hidden">err</span>
					<span id="clock" class="clock xs-hidden"></span>
					<span id="clock-verbose" class="clock xs-show"></span>
					─╮
				</div>
				<div class="prompt-line-bottom">
					╰─<span style="color: #89944c"
						><span class="error-prompt-tag hidden">( •_•)</span
						><span class="prompt-tag">(⌐■_■)</span></span
					>
					<div class="input-box">
						<p id="prompt-suggest"><span id="user-text"></span></p>
						<input
							type="text"
							id="prompt-input"
							placeholder="Try 'help'..."
							autocomplete="off"
						/>
					</div>
					─╯
				</div>
			</div>
		</div>
		<div class="prompt-output" id="cli-output">
			<!-- Here's where the output gets printed -->
		</div>
	</div>
</div>
