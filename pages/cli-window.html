<div class="prompt-container">
	<div class="prompt-wrapper">
		<div class="prompt-taker" id="cli-text">
			<div class="prompt-text" style="font-weight: bold">
				<div class="prompt-line-top">
					<span>╭─ 📚 31%</span>
					<span class="idle idle-styles">idle 0s</span>~
					<span class="fill-line"></span>
					<span
						><span class="prompt-tag">ok</span
						><span class="error-prompt-tag hidden">err</span> at
						<span class="clock">00:00:00 AM</span> ─╮</span
					>
				</div>
				<div class="prompt-line-bottom">
					╰─<span style="color: #89944c"
						><span class="error-prompt-tag hidden">( •_•)</span
						><span class="prompt-tag">(⌐■_■)</span></span
					>
					<div class="input-box">
						<input
							type="text"
							id="prompt-input"
							placeholder="Try 'help'..."
							autocomplete="off"
						/>
					</div>
					─╯
				</div>
			</div>
		</div>
		<div class="prompt-output" id="cli-output">
			<!-- Here's where the output gets printed -->
		</div>
	</div>
</div>
