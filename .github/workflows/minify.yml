name: Minify and Deploy

on:
    push:
        branches: [main]

jobs:
    minify:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v6
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install dependencies
              run: npm install -g terser csso-cli

            - name: Minify JS
              run: |
                  find . -name "*.js" -not -path "./node_modules/*" -not -name "*.min.js" | while read f; do
                    terser "$f" -o "$f" --compress --mangle
                  done

            - name: Minify CSS
              run: |
                  find . -name "*.css" -not -path "./node_modules/*" -not -name "*.min.css" | while read f; do
                    csso "$f" --output "$f"
                  done

            - name: Push to build
              run: |
                  git config user.email "bot@mzafarm.github.io"
                  git config user.name "GitHub-Actions-Bot"
                  git add -A
                  git commit -m "chore: minified assets" || exit 0
                  git push origin HEAD:build --force
